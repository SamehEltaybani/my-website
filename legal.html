<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Legal & Compliance | Dr. Sameh Eltaybani</title>
    <link rel="stylesheet" href="../../assets/css/custom-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sticky Header Logic */
        .sticky-wrapper {
        position: sticky;
        top: 0;
        z-index: 9999; /* Higher priority */
        background: white;
        width: 100%;
        display: block; /* Ensures it doesn't collapse */
        }
    
        /* Ensure the navbar itself has a minimum height so it doesn't "vanish" */
        .navbar {
        min-height: 60px; 
        }

        /* Legal Content Styling */
        .legal-card {
            background: white;
            border-left: 4px solid var(--amber, #b45309);
            padding: 2rem;
            margin-bottom: 2rem;
            border-radius: 0 8px 8px 0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .legal-title {
            color: #0f172a; /* midnight */
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
        }

        .legal-text {
            color: #475569; /* slate-600 */
            line-height: 1.8;
            font-size: 1.05rem;
        }

        .legal-text a {
            color: var(--amber, #b45309);
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="master-container">
        <div class="sticky-wrapper">
            <nav class="navbar"></nav>
            <div class="breadcrumb-bar">
                <a href="../../index.html">HOME</a> ❯ LEGAL
            </div>
        </div>

        <main class="max-w-4xl mx-auto px-6 py-16">
            <header class="mb-12">
                <h1 class="text-4xl font-extrabold text-slate-900 mb-4">Legal, Privacy & Compliance</h1>
                <p class="text-slate-500 italic">Last Updated: April 16, 2026</p>
            </header>

            <div id="legal-content-root"></div>
        </main>

        <div id="footer-placeholder"></div>
        
        <button id="backToTop" title="Go to top">↑</button>
    </div>

    <script src="../../assets/js/footer-bundle.js"></script>

    <script>
        /**
         * EDITABLE BLOCKS
         * To add a new section, just copy a block below and change the text.
         */
        const legalSections = [
            {
                title: "Professional Disclaimer",
                content: `The content, research findings, and opinions expressed on this website are exclusively those of <strong>Dr. Sameh Eltaybani</strong>. They do not necessarily reflect the official policies, positions, or endorsements of the <strong>University of Tokyo</strong> or any other affiliated institution.`
            },
            {
                title: "Geopolitical & Geographic Neutrality",
                content: `Reference to any specific country, territory, city, or the use of specific maps and borders is done for research and statistical categorization purposes only. It does not imply the expression of any opinion whatsoever concerning the legal status of any country or its authorities.`
            },
            {
                title: "Privacy Policy",
                content: `We value your privacy. We use anonymized analytics to improve user experience. No personal data is sold or shared with third parties. For more information, please refer to the <a href="https://gdpr-info.eu/" target="_blank">General Data Protection Regulation (GDPR)</a> guidelines.`
            },
            {
                title: "Cookie Policy",
                content: `This website uses essential cookies to ensure basic functionality. You can manage or disable cookies through your browser settings. Learn more at <a href="https://www.allaboutcookies.org/" target="_blank">AllAboutCookies.org</a>.`
            },
            {
                title: "Accessibility",
                content: `I am committed to digital accessibility and aim to conform to the <a href="https://www.w3.org/WAI/standards-guidelines/wcag/" target="_blank">Web Content Accessibility Guidelines (WCAG) 2.1 Level AA</a>.`
            }
        ];

        // Function to render the blocks
        function renderLegalContent() {
            const root = document.getElementById('legal-content-root');
            root.innerHTML = legalSections.map(section => `
                <div class="legal-card">
                    <h2 class="legal-title">${section.title}</h2>
                    <div class="legal-text">${section.content}</div>
                </div>
            `).join('');
        }

        // Initialize Page
        window.onload = () => {
            renderLegalContent();
            
            // Ensure no tabs are highlighted in the navbar
            const navLinks = document.querySelectorAll('.navbar a');
            navLinks.forEach(link => link.classList.remove('active'));
        };
    </script>
</body>
</html>
