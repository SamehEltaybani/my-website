<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | Dr. Sameh Eltaybani</title>
    <link rel="stylesheet" href="../../assets/css/custom-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sticky-header-container { position: sticky; top: var(--nav-height, 70px); z-index: 1001; background: white; width: 100%; }
        #progress-container { width: 100%; height: 4px; background: #f1f5f9; }
        #progress-bar { height: 100%; background: var(--amber); width: 0%; }

        .highlights-box { background-color: #f8fafc; border-left: 4px solid var(--midnight); padding: 20px; border-radius: 8px; margin: 30px 0; }
        .tip-box { background-color: #ecfeff; border-left: 4px solid #06b6d4; padding: 20px; border-radius: 8px; margin: 30px 0; }
        .warning-box { background-color: #fff7ed; border-left: 4px solid #f97316; padding: 20px; border-radius: 8px; margin: 30px 0; }

        .blog-content h2 { color: var(--midnight); font-weight: 800; font-size: 1.5rem; margin-top: 40px; margin-bottom: 15px; }
        .blog-content h3 { font-weight: 700; margin-top: 20px; }

        .image-placeholder { background: #f1f5f9; border: 2px dashed #cbd5e1; padding: 40px; text-align: center; border-radius: 12px; margin: 30px 0; }
        .recommendation-link { display: block; padding: 10px 0; border-bottom: 1px solid #e2e8f0; color: var(--midnight); text-decoration: none; transition: 0.2s; }
        .recommendation-link:hover { color: var(--amber); padding-left: 5px; }

        #backToTop {
            position: fixed; bottom: 30px; right: 30px; width: 45px; height: 45px;
            background-color: var(--amber); color: white; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            text-decoration: none; z-index: 3000; transition: 0.3s;
        }
        #backToTop:hover { background-color: var(--midnight); transform: translateY(-5px); }
    </style>
</head>
<body>

<script>

    title: "Advancing Biostatistical Methods in Gerontology",
    shortTitle: "Gerontology Methods",
    date: "April 10, 2026",
    categories: ["Biostatistics", "Research Integrity"],
    highlights: [
        "Key finding regarding longitudinal data in aging populations.",
        "Implementation of advanced Python-based analytics.",
        "Ethical considerations in nursing data management."
    ],

    tip: "This is a useful tip related to your article.",
    warning: "This is an important warning readers should know.",

    heading1: "Introduction to Longitudinal Analysis",
    content1: "Main paragraph under heading 1.",
    sub1a: "Subheading 1A",
    sub1a_content: "Content under subheading 1A.",
    sub1b: "Subheading 1B",
    sub1b_content: "Content under subheading 1B.",

    between1: "Optional paragraph between section 1 and 2.",

    heading2: "Methodology and Data Integrity",
    content2: "Main paragraph under heading 2.",
    sub2a: "Subheading 2A",
    sub2a_content: "Content under subheading 2A.",
    sub2b: "Subheading 2B",
    sub2b_content: "Content under subheading 2B.",

    imageCaption: "Figure 1: Distribution of cognitive health scores.",
    imageFilename: "data-chart-01.png"
};
/* ========================================================== */
</script>

<div class="master-container">
<nav class="navbar"></nav>

<div class="sticky-header-container">
    <div class="breadcrumb-bar" style="border-bottom: 1px solid #f1f5f9;">
        <a href="../../index.html">HOME</a> ❯ 
        <a href="blog.html">BLOG</a> ❯ 
        <span id="inject-breadcrumb"></span>
    </div>
    <div id="progress-container"><div id="progress-bar"></div></div>
</div>

<article class="max-w-4xl mx-auto p-8 md:p-16 blog-content">
    <h1 id="inject-title"></h1>

    <div class="flex items-center gap-4 mb-8 text-sm text-slate-500" id="meta-container">
        <span id="inject-date"></span>
        <div id="inject-categories" class="flex gap-2"></div>
    </div>

    <div class="highlights-box" id="highlights-box">
        <h4>Highlights</h4>
        <ul id="inject-highlights"></ul>
    </div>

    <div class="tip-box" id="tip-box">
        <strong>Tip:</strong>
        <p id="inject-tip"></p>
    </div>

    <div class="warning-box" id="warning-box">
        <strong>Warning:</strong>
        <p id="inject-warning"></p>
    </div>

    <div class="leading-relaxed text-slate-800 text-lg space-y-6">

        <div id="section1">
            <h2 id="inject-h1"></h2>
            <p id="inject-c1"></p>

            <h3 id="inject-sub1a"></h3>
            <p id="inject-sub1a-c"></p>

            <h3 id="inject-sub1b"></h3>
            <p id="inject-sub1b-c"></p>
        </div>

        <p id="inject-between1"></p>

        <div class="image-placeholder" id="image-box">
            <p id="inject-img-file"></p>
            <p id="inject-img-cap"></p>
        </div>

        <div id="section2">
            <h2 id="inject-h2"></h2>
            <p id="inject-c2"></p>

            <h3 id="inject-sub2a"></h3>
            <p id="inject-sub2a-c"></p>

            <h3 id="inject-sub2b"></h3>
            <p id="inject-sub2b-c"></p>
        </div>

    </div>

    <div class="mt-20 pt-10 border-t border-slate-200">
        <a href="blog.html" class="inline-block bg-slate-800 text-white px-8 py-3 rounded-full font-bold hover:bg-amber-700 transition mb-10">Explore more insights ❯</a>
        <h4>Recommended for you</h4>
        <div id="recommended-list"></div>
    </div>
</article>

<a href="#" id="backToTop">↑</a>
<div id="footer-placeholder"></div>
</div>

<script src="../../assets/js/footer-bundle.js"></script>
<script src="../../assets/js/blog-registry.js"></script>

<script>
const setOrHide = (id, value) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (!value || value === "") {
        el.style.display = "none";
    } else {
        el.style.display = "";
        el.innerText = value;
    }
};

document.addEventListener("DOMContentLoaded", function() {

    setOrHide('inject-breadcrumb', postData.shortTitle || postData.title);
    setOrHide('inject-title', postData.title);
    setOrHide('inject-date', postData.date);

    if (!postData.categories.length) document.getElementById('inject-categories').style.display = "none";
    else document.getElementById('inject-categories').innerHTML =
        postData.categories.map(c => `<span>${c}</span>`).join('');

    if (!postData.highlights.length) document.getElementById('highlights-box').style.display = "none";
    else document.getElementById('inject-highlights').innerHTML =
        postData.highlights.map(h => `<li>${h}</li>`).join('');

    setOrHide('inject-tip', postData.tip);
    if (!postData.tip) document.getElementById('tip-box').style.display = "none";

    setOrHide('inject-warning', postData.warning);
    if (!postData.warning) document.getElementById('warning-box').style.display = "none";

    setOrHide('inject-h1', postData.heading1);
    setOrHide('inject-c1', postData.content1);
    setOrHide('inject-sub1a', postData.sub1a);
    setOrHide('inject-sub1a-c', postData.sub1a_content);
    setOrHide('inject-sub1b', postData.sub1b);
    setOrHide('inject-sub1b-c', postData.sub1b_content);

    setOrHide('inject-between1', postData.between1);

    setOrHide('inject-h2', postData.heading2);
    setOrHide('inject-c2', postData.content2);
    setOrHide('inject-sub2a', postData.sub2a);
    setOrHide('inject-sub2a-c', postData.sub2a_content);
    setOrHide('inject-sub2b', postData.sub2b);
    setOrHide('inject-sub2b-c', postData.sub2b_content);

    if (!postData.imageFilename) {
        document.getElementById('image-box').style.display = "none";
    } else {
        document.getElementById('inject-img-file').innerText = "[ IMAGE: " + postData.imageFilename + " ]";
        document.getElementById('inject-img-cap').innerText = postData.imageCaption;
    }

    const btt = document.getElementById('backToTop');
    window.onscroll = function() {
        let winScroll = document.documentElement.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
        btt.style.display = winScroll > 300 ? "flex" : "none";
    };

    btt.onclick = (e) => {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const recs = blogPosts.filter(p => p.title !== postData.title).slice(0, 5);
    document.getElementById('recommended-list').innerHTML = recs.map(p => `
        <a href="${p.link}" class="recommendation-link">${p.title}</a>
    `).join('');
});
</script>

</body>
</html>
