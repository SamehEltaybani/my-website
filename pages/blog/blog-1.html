        .image-placeholder { background: #f1f5f9; border: 2px dashed #cbd5e1; padding: 40px; text-align: center; border-radius: 12px; margin: 30px 0; }
        .recommendation-link { display: block; padding: 10px 0; border-bottom: 1px solid #e2e8f0; color: var(--midnight); text-decoration: none; transition: 0.2s; }

        .tip-box { background:#ecfdf5; border-left:4px solid #10b981; padding:15px; margin:20px 0; border-radius:8px; }
        .warning-box { background:#fef2f2; border-left:4px solid #ef4444; padding:15px; margin:20px 0; border-radius:8px; }

        #backToTop {

            bottom: 30px;

    highlights: [

        "Machine learning enhances aging research.",

    tip: "Always validate your dataset before applying complex statistical models.",

    heading1: "Introduction to Longitudinal Analysis",
    content1: "Longitudinal analysis is essential in understanding how aging impacts populations over time. It allows researchers to observe trends and causal relationships.",
    subheading1a: "Why Longitudinal Data Matters",
    subcontent1a: "Tracking the same individuals over time provides deeper insights compared to cross-sectional studies.",
    subheading1b: "Key Challenges",
    subcontent1b: "Handling missing data and participant dropout are major methodological concerns.",

    heading2: "Methodology and Data Integrity",
    content2: "Ensuring data integrity is fundamental in research. Proper validation and cleaning processes must be followed.",

    imageCaption: "Figure 1: Sample data distribution in aging research.",
    imageFilename: "data-chart-01.png"
};
</script>

<script>
document.addEventListener("DOMContentLoaded", function() {

const setText = (id, value) => {
    const el = document.getElementById(id);
    if (!value) { el.style.display = "none"; }
    else { el.innerText = value; }
};

const setHTML = (id, value) => {
    const el = document.getElementById(id);
    if (!value || value.length === 0) { el.style.display = "none"; }
    else { el.innerHTML = value; }
};

setText('inject-title', postData.title);
setText('inject-breadcrumb', postData.shortTitle || postData.title);
setText('inject-date', postData.date);

setHTML('inject-categories', postData.categories?.map(c => `<span>${c}</span>`).join(''));
setHTML('inject-highlights', postData.highlights?.map(h => `<li>${h}</li>`).join(''));

setText('tip-box', postData.tip);
setText('warning-box', postData.warning);

setText('inject-h1', postData.heading1);
setText('inject-c1', postData.content1);
setText('inject-sh1a', postData.subheading1a);
setText('inject-sc1a', postData.subcontent1a);
setText('inject-sh1b', postData.subheading1b);
setText('inject-sc1b', postData.subcontent1b);

setText('inject-h2', postData.heading2);
setText('inject-c2', postData.content2);
setText('inject-sh2a', postData.subheading2a);
setText('inject-sc2a', postData.subcontent2a);
setText('inject-sh2b', postData.subheading2b);
setText('inject-sc2b', postData.subcontent2b);

if (!postData.imageFilename) {
    document.getElementById("image-box").style.display = "none";
} else {
    setText('inject-img-file', "[ IMAGE: " + postData.imageFilename + " ]");
    setText('inject-img-cap', postData.imageCaption);
}

});
</script>
