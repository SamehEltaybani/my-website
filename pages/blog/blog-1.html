<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | Dr. Sameh Eltaybani</title>
    <link rel="stylesheet" href="../../assets/css/custom-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sticky-header-container {
            position: sticky;
            top: var(--nav-height, 70px);
            z-index: 1001;
            background: white;
            width: 100%;
        }

        #progress-container { width: 100%; height: 4px; background: #f1f5f9; }
        #progress-bar { height: 100%; background: var(--amber); width: 0%; }

        /* Callout Boxes - Compacted */
        .highlights-box { background-color: #f8fafc; border-left: 4px solid var(--midnight); padding: 15px 20px; border-radius: 8px; margin: 20px 0; }
        .tip-box { background-color: #ecfeff; border-left: 4px solid #06b6d4; padding: 15px 20px; border-radius: 8px; margin: 20px 0; }
        .warning-box { background-color: #fff7ed; border-left: 4px solid #f97316; padding: 15px 20px; border-radius: 8px; margin: 20px 0; }
        .note-box { background-color: #eae5ff; border-left: 4px solid #ac99ff; padding: 15px 20px; border-radius: 8px; margin: 20px 0; }

        /* Action Boxes (With Buttons) */
        .action-box { position: relative; padding-bottom: 50px !important; }
        .action-btn {
            position: absolute;
            bottom: 12px;
            right: 15px;
            background: #1e293b;
            color: white !important;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .action-btn:hover { background: var(--amber); transform: translateY(-2px); }

        /* Content Styling - Dark Black Text */
        .blog-content h2 { color: var(--midnight); font-weight: 800; font-size: 1.75rem; margin-top: 40px; margin-bottom: 15px; line-height: 1.2; }
        .blog-content h3 { margin-top: 25px; margin-bottom: 12px; font-weight: 800; font-size: 1.3rem; position: relative; padding-left: 20px; color: var(--midnight); }
        .blog-content h3::before { content: ""; position: absolute; left: 0; top: 6px; width: 4px; height: 70%; background-color: var(--amber); border-radius: 2px; }
        
        .blog-content p, .blog-content li, .tip-box p, .warning-box p, .note-box p { 
            color: #000000 !important; 
            margin-bottom: 18px; 
            line-height: 1.8; 
        }
        
        .blog-content ul.bullet-list { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 18px; }
        .blog-content ol.numbered-list { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 18px; }
        .blog-content li { margin-bottom: 6px; }

        .image-container { text-align: center; margin: 35px 0; }
        .image-container img { max-width: 100%; height: auto; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); margin-bottom: 10px; }
        .image-caption { font-style: italic; font-size: 0.85rem; color: #64748b; }

        .recommendation-link { display: block; padding: 10px 0; border-bottom: 1px solid #e2e8f0; color: var(--midnight); text-decoration: none; transition: 0.2s; }
        .recommendation-link:hover { color: var(--amber); padding-left: 5px; }

        #backToTop {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 45px;
            height: 45px;
            background-color: var(--amber);
            color: white;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            z-index: 3000;
            transition: 0.3s;
        }
        #backToTop:hover { background-color: var(--midnight); transform: translateY(-5px); }
    </style>
</head>
<body>

<script>
/* ==========================================================
   EDIT YOUR CONTENT HERE
   ========================================================== */

const postData = {
    title: "Advanced Clinical Data Management",
    shortTitle: "Data Management",
    date: "April 13, 2026",
    categories: ["Clinical Research", "Data Integrity"],

    highlights: [
        "Ensuring data quality through rigorous validation protocols.",
        "Implementing secure cloud-based storage for patient records.",
        "Streamlining data entry workflows for clinical staff."
    ],

    // FLEXIBLE CONTENT ARRAY
    // Types: 'paragraph', 'heading', 'subheading', 'bulletList', 'numberedList', 'image', 'tip', 'warning', 'note'
    // Action Types: 'tipAction', 'warningAction', 'noteAction' (Includes a button)
    content: [
        { 
            type: 'paragraph', 
            text: "Effective data management is the backbone of any successful clinical study. By ensuring that information is captured accurately and stored securely, researchers can maintain the <b>integrity</b> of their findings and protect patient privacy." 
        },
        { 
            type: 'note', 
            text: "This note box now matches the highlights style with a light gray background and navy border, and it is more compact vertically." 
        },
        { 
            type: 'heading', 
            text: "Data Validation Strategies" 
        },
        { 
            type: 'paragraph', 
            text: "Validation should occur at multiple stages, from initial entry to final analysis. This prevents errors from propagating through the dataset." 
        },
        { 
            type: 'tipAction', 
            text: "Check out our full guide on data validation protocols for more detailed steps.",
            btnText: "Click that button to go  ❯❯",
            btnUrl: "https://example.com/validation-guide"
        },
        { 
            type: 'subheading', 
            text: "Common Pitfalls" 
        },
        { 
            type: 'bulletList', 
            items: [
                "Inconsistent unit measurements across different sites.",
                "Missing data points due to poor form design.",
                "Lack of standardized naming conventions."
            ] 
        },
        { 
            type: 'warningAction', 
            text: "Security breaches can occur if encryption is not applied to data in transit.",
            btnText: "Security Protocol ❯❯",
            btnUrl: "https://example.com/security"
        },
        { 
            type: 'image', 
            src: "../../assets/img/analyst-2.JPG", 
            caption: "Figure 1: Overview of a secure clinical data pipeline." 
        },
        { 
            type: 'noteAction', 
            text: "You can also use these action boxes for external resources or related blog posts.",
            btnText: "Read Related Post  ❯❯",
            btnUrl: "https://example.com/blog-205"
        }
    ]
};

/* ========================================================== */
</script>

<div class="master-container">
    <nav class="navbar"></nav>
    
    <div class="sticky-header-container">
        <div class="breadcrumb-bar" style="border-bottom: 1px solid #f1f5f9;">
            <a href="../../index.html" style="text-decoration:none; color:inherit;">HOME</a> ❯ 
            <a href="blog.html" style="text-decoration:none; color:inherit;">BLOG</a> ❯ 
            <span id="inject-breadcrumb"></span>
        </div>
        <div id="progress-container"><div id="progress-bar"></div></div>
    </div>

    <article class="max-w-5xl mx-auto p-6 md:p-16 blog-content">
        <h1 id="inject-title" class="text-3xl md:text-5xl font-extrabold mb-6" style="color: var(--midnight);"></h1>
        
        <div class="flex flex-col gap-2 mb-10 text-sm text-slate-500">
            <div id="inject-categories" class="flex gap-2"></div>
            <div class="flex items-center gap-4">
                <span id="inject-date"></span>
                <span id="inject-read-time" class="italic"></span>
        </div>

        <div class="highlights-box" id="highlights-box">
            <h4 class="uppercase tracking-widest text-xs font-bold mb-3" style="color: var(--amber);">Highlights</h4>
            <ul id="inject-highlights" class="list-disc ml-5 space-y-2"></ul>
        </div>

        <div id="dynamic-content"></div>

        <div class="mt-20 pt-10 border-t border-slate-200">
            <div class="text-right">
                <a href="blog.html" class="inline-block bg-slate-800 text-white px-8 py-3 rounded-full font-bold hover:bg-amber-700 transition mb-10">Explore more insights  ❯❯</a>
            </div>
            <h4 class="font-bold text-xl mb-6" style="color: var(--midnight);">Recommended for you</h4>
            <div id="recommended-list"></div>
        </div>
    </article>

    <a href="#" id="backToTop">↑</a>
    <div id="footer-placeholder"></div>
</div>

<script src="../../assets/js/footer-bundle.js"></script>
<script src="../../assets/js/blog-registry.js"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    const syncNav = () => {
        const nav = document.querySelector('.navbar');
        if (nav) document.documentElement.style.setProperty('--nav-height', nav.offsetHeight + 'px');
    };
    const resizeObs = new ResizeObserver(() => syncNav());
    const nav = document.querySelector('.navbar');
    if (nav) resizeObs.observe(nav);
    syncNav();

    document.getElementById('inject-breadcrumb').innerText = postData.shortTitle || postData.title;
    document.getElementById('inject-title').innerText = postData.title;
    document.getElementById('inject-date').innerText = postData.date;

    
    // Calculate reading time (approx 200 words per minute)
        const textContent = postData.content.map(item => item.text || "").join(" ");
        const wordCount = textContent.split(/\s+/).length;
        const readTime = Math.ceil(wordCount / 200);
        document.getElementById('inject-read-time').innerText = `• ${readTime} min read`;
    
    
    const catContainer = document.getElementById('inject-categories');
    if (postData.categories) {
        catContainer.innerHTML = postData.categories.map(c => 
            `<span style="background:rgba(30,58,138,0.1); color:var(--midnight); padding:2px 10px; border-radius:4px; font-size:10px; font-weight:800; text-transform:uppercase;">${c}</span>`
        ).join('');
    }

    const highBox = document.getElementById('highlights-box');
    if (!postData.highlights || postData.highlights.length === 0) {
        highBox.style.display = "none";
    } else {
        document.getElementById('inject-highlights').innerHTML = postData.highlights.map(h => `<li>${h}</li>`).join('');
    }

    const container = document.getElementById('dynamic-content');
    let finalHtml = "";

    postData.content.forEach(item => {
        switch(item.type) {
            case 'paragraph': finalHtml += `<p>${item.text}</p>`; break;
            case 'heading': finalHtml += `<h2>${item.text}</h2>`; break;
            case 'subheading': finalHtml += `<h3>${item.text}</h3>`; break;
            case 'bulletList': finalHtml += `<ul class="bullet-list">${item.items.map(li => `<li>${li}</li>`).join('')}</ul>`; break;
            case 'numberedList': finalHtml += `<ol class="numbered-list">${item.items.map(li => `<li>${li}</li>`).join('')}</ol>`; break;
            case 'image':
                finalHtml += `<div class="image-container"><img src="${item.src}" alt="${item.caption || ''}">${item.caption ? `<p class="image-caption">${item.caption}</p>` : ''}</div>`;
                break;
            case 'tip':
                finalHtml += `<div class="tip-box"><h4 class="uppercase tracking-widest text-xs font-bold mb-2" style="color:#06b6d4;">Tip</h4><p>${item.text}</p></div>`;
                break;
            case 'warning':
                finalHtml += `<div class="warning-box"><h4 class="uppercase tracking-widest text-xs font-bold mb-2" style="color:#f97316;">Warning</h4><p>${item.text}</p></div>`;
                break;
            case 'note':
                finalHtml += `<div class="note-box"><h4 class="uppercase tracking-widest text-xs font-bold mb-2" style="color:var(--midnight);">Note</h4><p>${item.text}</p></div>`;
                break;
            case 'tipAction':
                finalHtml += `<div class="tip-box action-box"><h4 class="uppercase tracking-widest text-xs font-bold mb-2" style="color:#06b6d4;">Tip</h4><p>${item.text}</p><a href="${item.btnUrl}" target="_blank" class="action-btn">${item.btnText}</a></div>`;
                break;
            case 'warningAction':
                finalHtml += `<div class="warning-box action-box"><h4 class="uppercase tracking-widest text-xs font-bold mb-2" style="color:#f97316;">Warning</h4><p>${item.text}</p><a href="${item.btnUrl}" target="_blank" class="action-btn">${item.btnText}</a></div>`;
                break;
            case 'noteAction':
                finalHtml += `<div class="note-box action-box"><h4 class="uppercase tracking-widest text-xs font-bold mb-2" style="color:var(--midnight);">Note</h4><p>${item.text}</p><a href="${item.btnUrl}" target="_blank" class="action-btn">${item.btnText}</a></div>`;
                break;
        }
    });
    container.innerHTML = finalHtml;

    const btt = document.getElementById('backToTop');
    window.onscroll = function() {
        let winScroll = document.documentElement.scrollTop || document.body.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
        btt.style.display = winScroll > 300 ? "flex" : "none";
    };
    btt.onclick = (e) => { e.preventDefault(); window.scrollTo({ top: 0, behavior: 'smooth' }); };

    if (typeof blogPosts !== 'undefined') {
        const recs = blogPosts.filter(p => p.title !== postData.title).slice(0, 5);
        document.getElementById('recommended-list').innerHTML = recs.map(p => `
            <a href="${p.link}" class="recommendation-link">${p.title} <span class="text-slate-300 text-xs ml-2">— ${p.date}</span></a>
        `).join('');
    }

    const blogLink = document.querySelector('.navbar a[href*="blog.html"]');
    if (blogLink) {
        blogLink.classList.add('bg-amber-700', 'text-white', 'rounded-2xl', 'px-4', 'py-2', 'font-bold');
        blogLink.style.transition = "none"; 
    }
});
</script>

</body>
</html>
