<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Blog Post | Dr. Sameh Eltaybani</title>

<link rel="stylesheet" href="../../assets/css/custom-style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<style>
/* ===== Layout adjustment (HALF margins) ===== */
.blog-wrapper {
    max-width: 900px; /* reduced from ~1200+ */
    margin: auto;
    padding: 40px 20px;
}

/* ===== Existing styles kept ===== */
.highlights-box { background-color: #f8fafc; border-left: 4px solid var(--midnight); padding: 20px; border-radius: 8px; margin: 30px 0; }
.blog-content h2 { color: var(--midnight); font-weight: 800; font-size: 1.5rem; margin-top: 40px; }
.blog-content h3 { color: var(--midnight); font-weight: 700; font-size: 1.2rem; margin-top: 25px; }
.image-placeholder { margin: 30px 0; }
.recommendation-link { display:block; padding:10px 0; border-bottom:1px solid #e2e8f0; }

#backToTop {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 45px;
    height: 45px;
    background: var(--amber);
    color: white;
    border-radius: 50%;
    display:none;
    align-items:center;
    justify-content:center;
}
</style>
</head>

<body>

<script>
/* ===============================
   EDIT ONLY THIS SECTION
================================ */
const postData = {

title: "Advancing Biostatistical Methods in Gerontology",
shortTitle: "Gerontology Methods",
date: "April 10, 2026",

intro: "This article explores modern statistical approaches in aging research. You can also explore related work at <a href='https://www.ncbi.nlm.nih.gov' target='_blank'>this external resource</a>.",

categories: ["Biostatistics","Aging","Data Science"],

highlights: [
"Longitudinal modeling improves accuracy",
"Python enhances reproducibility",
"Ethics is critical in healthcare data"
],

sections: [

{
type:"text",
heading:"Introduction to Longitudinal Analysis",
content:"Longitudinal data tracks individuals over time. For example, you can review <a href='https://en.wikipedia.org/wiki/Longitudinal_study' target='_blank'>this explanation of longitudinal studies</a>."
},

{
type:"subsection",
subheading:"Why it matters",
content:"Understanding changes over time is essential in gerontology."
},

{
type:"image",
src:"../../assets/img/reel-5-trial.webp",
caption:"Study design overview"
},

{
type:"text",
heading:"Methodology",
content:"Data integrity ensures reliability of results."
},

{
type:"subsection",
subheading:"Missing Data Handling",
content:"Missing data must be handled carefully to avoid bias."
},

{
type:"quote",
content:"Good data tells a story — great analysis reveals truth.",
author:"Dr. Sameh"
},

{
type:"tip",
content:"Always validate your dataset before analysis."
},

{
type:"warning",
content:"Ignoring missing data can invalidate your study."
},

{
type:"image",
src:"../../assets/img/analyst-6.JPG",
caption:"Analytical workflow"
}

]

};
/* =============================== */
</script>

<div class="master-container">
<nav class="navbar"></nav>

<article class="blog-wrapper blog-content">

<h1 id="title"></h1>

<div id="meta"></div>

<div id="highlights-box" class="highlights-box">
<h4>Highlights</h4>
<ul id="highlights"></ul>
</div>

<div id="toc"></div>

<div id="intro"></div>

<div id="content"></div>

</article>

<a href="#" id="backToTop">↑</a>

</div>

<script>

/* ===== Helper ===== */
const safe = v => v && v.trim() !== "";

/* ===== Basic ===== */
document.getElementById("title").innerHTML = postData.title;

let metaHTML = postData.date;

/* Reading time */
const words = JSON.stringify(postData).split(" ").length;
metaHTML += " • " + Math.ceil(words/200) + " min read";

document.getElementById("meta").innerHTML = metaHTML;

/* ===== Highlights ===== */
if(postData.highlights?.length){
document.getElementById("highlights").innerHTML =
postData.highlights.map(h=>`<li>${h}</li>`).join("");
}else{
document.getElementById("highlights-box").style.display="none";
}

/* ===== Intro ===== */
if(safe(postData.intro)){
document.getElementById("intro").innerHTML = `<p>${postData.intro}</p>`;
}

/* ===== Sections + TOC ===== */
let tocItems = [];
let contentHTML = "";

postData.sections.forEach((sec,i)=>{

if(sec.type==="text" && safe(sec.content)){
if(safe(sec.heading)){
let id="sec-"+i;
tocItems.push(`<li><a href="#${id}">${sec.heading}</a></li>`);
contentHTML += `<h2 id="${id}">${sec.heading}</h2>`;
}
contentHTML += `<p>${sec.content}</p>`;
}

if(sec.type==="subsection" && safe(sec.content)){
let id="sub-"+i;
tocItems.push(`<li style="margin-left:15px;"><a href="#${id}">${sec.subheading}</a></li>`);
contentHTML += `<h3 id="${id}">${sec.subheading}</h3>`;
contentHTML += `<p>${sec.content}</p>`;
}

if(sec.type==="image" && safe(sec.src)){
contentHTML += `
<div class="image-placeholder">
<img src="${sec.src}" style="border-radius:10px;">
${safe(sec.caption)?`<p>${sec.caption}</p>`:""}
</div>`;
}

if(sec.type==="quote" && safe(sec.content)){
contentHTML += `
<div style="border-left:4px solid var(--amber); padding:15px; background:#fff7ed;">
<p>"${sec.content}"</p>
${safe(sec.author)?`<p>— ${sec.author}</p>`:""}
</div>`;
}

if(sec.type==="tip" && safe(sec.content)){
contentHTML += `<div style="background:#ecfeff;padding:15px;"><b>Tip:</b> ${sec.content}</div>`;
}

if(sec.type==="warning" && safe(sec.content)){
contentHTML += `<div style="background:#fef2f2;padding:15px;"><b>Warning:</b> ${sec.content}</div>`;
}

});

document.getElementById("content").innerHTML = contentHTML;

/* ===== TOC ===== */
if(tocItems.length){
document.getElementById("toc").innerHTML = `
<div class="highlights-box">
<h4>Contents</h4>
<ul>${tocItems.join("")}</ul>
</div>`;
}

/* ===== Back to top ===== */
const btt=document.getElementById("backToTop");
window.onscroll=()=>{
if(window.scrollY>300){btt.style.display="flex";}
else{btt.style.display="none";}
};
btt.onclick=e=>{
e.preventDefault();
window.scrollTo({top:0,behavior:"smooth"});
};

</script>

</body>
</html>
