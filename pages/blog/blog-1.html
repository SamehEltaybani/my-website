<script>
const setOrHide = (id, value) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (!value || value === "") el.style.display = "none";
    else el.innerText = value;
};

const hideContainerIfEmpty = (containerId, value) => {
    if (!value || value === "") {
        const el = document.getElementById(containerId);
        if (el) el.style.display = "none";
    }
};

const syncNav = () => {
    const nav = document.querySelector('.navbar');
    if (nav) document.documentElement.style.setProperty('--nav-height', nav.offsetHeight + 'px');
};
const resizeObs = new ResizeObserver(() => syncNav());

document.addEventListener("DOMContentLoaded", function() {

    const nav = document.querySelector('.navbar');
    if (nav) resizeObs.observe(nav);
    syncNav();

    document.getElementById('inject-breadcrumb').innerText = postData.shortTitle || postData.title;

    setOrHide('inject-title', postData.title);
    setOrHide('inject-date', postData.date);

    document.getElementById('inject-categories').innerHTML = postData.categories.map(c => 
        `<span style="background:rgba(30,58,138,0.1); color:var(--midnight); padding:2px 10px; border-radius:4px; font-size:10px; font-weight:800; text-transform:uppercase;">${c}</span>`
    ).join('');

    if (!postData.highlights.length) document.getElementById('highlights-box').style.display = "none";
    else document.getElementById('inject-highlights').innerHTML = postData.highlights.map(h => `<li>${h}</li>`).join('');

    setOrHide('inject-tip', postData.tip);
    hideContainerIfEmpty('tip-box', postData.tip);

    setOrHide('inject-warning', postData.warning);
    hideContainerIfEmpty('warning-box', postData.warning);

    setOrHide('inject-h1', postData.heading1);
    setOrHide('inject-c1', postData.content1);
    setOrHide('inject-sub1a', postData.sub1a);
    setOrHide('inject-sub1a-c', postData.sub1a_content);
    setOrHide('inject-sub1b', postData.sub1b);
    setOrHide('inject-sub1b-c', postData.sub1b_content);

    setOrHide('inject-between1', postData.between1);

    setOrHide('inject-h2', postData.heading2);
    setOrHide('inject-c2', postData.content2);
    setOrHide('inject-sub2a', postData.sub2a);
    setOrHide('inject-sub2a-c', postData.sub2a_content);
    setOrHide('inject-sub2b', postData.sub2b);
    setOrHide('inject-sub2b-c', postData.sub2b_content);

    const imageBox = document.querySelector('.image-placeholder');
    if (!postData.imageFilename) imageBox.style.display = "none";
    else {
        document.getElementById('inject-img-file').innerText = "[ IMAGE: " + postData.imageFilename + " ]";
        document.getElementById('inject-img-cap').innerText = postData.imageCaption;
    }

    const btt = document.getElementById('backToTop');
    window.onscroll = function() {
        let winScroll = document.documentElement.scrollTop || document.body.scrollTop;
        let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        document.getElementById("progress-bar").style.width = (winScroll / height) * 100 + "%";
        btt.style.display = winScroll > 300 ? "flex" : "none";
    };

    btt.onclick = (e) => {
        e.preventDefault();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    const recs = blogPosts.filter(p => p.title !== postData.title).slice(0, 5);
    document.getElementById('recommended-list').innerHTML = recs.map(p => `
        <a href="${p.link}" class="recommendation-link">${p.title} <span class="text-slate-300 text-xs ml-2">— ${p.date}</span></a>
    `).join('');

    const blogLink = document.querySelector('.navbar a[href*="blog.html"]');
    if (blogLink) {
        blogLink.classList.add('bg-amber-700', 'text-white', 'rounded-2xl', 'px-4', 'py-2', 'font-bold');
        blogLink.style.transition = "none"; 
    }
});
</script>
