<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post | Dr. Sameh Eltaybani</title>
    <link rel="stylesheet" href="../../assets/css/custom-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 1. THE MOBILE-FIRST STICKY LOCK */
        :root {
            --midnight: #0f172a;
            --amber-accent: #D97706;
        }

        /* This container forces the sticky bars to stay visible on ALL screens */
        .sticky-wrapper {
            position: -webkit-sticky;
            position: sticky;
            top: 69px; /* Adjust if your navbar height varies */
            z-index: 1100;
            background: white;
            width: 100%;
            border-bottom: 1px solid #e2e8f0;
        }

        .breadcrumb-bar {
            padding: 12px 20px;
            font-size: 13px;
            background: white;
        }

        #progress-container { width: 100%; height: 4px; background: #f1f5f9; }
        #progress-bar { height: 100%; background: var(--amber-accent); width: 0%; transition: width 0.1s ease-out; }

        /* 2. COLOR CONSISTENCY (MIDNIGHT BLUE) */
        .highlights-box { 
            background-color: #f8fafc; 
            border-left: 4px solid var(--midnight); 
            padding: 25px; 
            border-radius: 8px; 
            margin: 35px 0; 
        }

        .section-title-blue { color: var(--midnight); font-weight: 800; }
        
        .recommendation-link { 
            display: block; padding: 12px 0; 
            border-bottom: 1px solid #e2e8f0; 
            color: var(--midnight); 
            font-weight: 600;
            text-decoration: none; 
            transition: 0.2s; 
        }
        .recommendation-link:hover { color: var(--amber-accent); padding-left: 8px; }

        /* 3. TYPOGRAPHY & SPACING */
        .blog-content h2 { color: var(--midnight); font-weight: 800; font-size: 1.85rem; margin-top: 50px; margin-bottom: 8px; }
        .lead-in-text { color: #475569; font-size: 1.15rem; font-style: italic; margin-bottom: 12px; line-height: 1.5; }
        .sub-heading { color: #64748b; font-weight: 600; font-size: 1.1rem; margin-bottom: 25px; line-height: 1.4; }
        
        /* 4. BACK TO TOP BUTTON */
        #backToTop {
            position: fixed; bottom: 30px; right: 30px;
            background: var(--midnight); color: white;
            width: 50px; height: 50px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; opacity: 0; transition: 0.4s; z-index: 2000;
            border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #backToTop.visible { opacity: 1; pointer-events: auto; }
        #backToTop:not(.visible) { pointer-events: none; }
        #backToTop:hover { background: var(--amber-accent); transform: translateY(-5px); }
    </style>
</head>
<body>

<script>
    /* ==========================================================
       EDIT YOUR CONTENT HERE
       ========================================================== */
    const postData = {
        title: "Advancing Biostatistical Methods in Gerontology",
        shortTitle: "Gerontology Methods",
        date: "April 10, 2026",
        categories: ["Biostatistics", "Research Integrity"],
        
        highlights: [
            "Key finding regarding longitudinal data in aging populations.",
            "Implementation of advanced Python-based analytics.",
            "Ethical considerations in nursing data management."
        ],

        // SECTION 1
        heading1: "Introduction to Longitudinal Analysis",
        leadIn1: "Before diving into specific models, we must understand the temporal nature of aging.", 
        subHeading1: "Exploring the foundational frameworks of aging data", 
        content1: "This is where your first paragraph goes. You can write as much as you want here.",
        
        // SECTION 2
        heading2: "Methodology and Data Integrity",
        leadIn2: "Accuracy is the bedrock of any clinical research study.",
        subHeading2: "Ensuring accuracy in complex nursing datasets", 
        content2: "This is the content for your second section.",
        
        imageCaption: "Figure 1: Distribution of cognitive health scores across the study cohort.",
        imageFilename: "data-chart-01.png" 
    };
    /* ========================================================== */
</script>

    <div class="master-container">
        <nav class="navbar"></nav>
        
        <div class="sticky-wrapper">
            <div class="breadcrumb-bar">
                <a href="../../index.html" style="text-decoration:none; color:inherit;">HOME</a> ❯ 
                <a href="blog.html" style="text-decoration:none; color:inherit;">BLOG</a> ❯ 
                <span id="inject-breadcrumb" class="font-bold text-slate-400 uppercase tracking-tight"></span>
            </div>
            <div id="progress-container"><div id="progress-bar"></div></div>
        </div>

        <article class="max-w-6xl mx-auto p-6 md:p-16 blog-content">
            <h1 id="inject-title" class="text-4xl md:text-6xl font-extrabold mb-4 leading-tight" style="color: var(--midnight);"></h1>
            
            <div class="flex items-center gap-4 mb-10 text-sm text-slate-500">
                <span id="inject-date"></span>
                <div id="inject-categories" class="flex gap-2"></div>
            </div>

            <div class="highlights-box">
                <h4 class="uppercase tracking-widest text-xs font-bold mb-3" style="color: var(--amber-accent);">Highlights</h4>
                <ul id="inject-highlights" class="list-disc ml-5 space-y-2 text-slate-700"></ul>
            </div>

            <div class="leading-relaxed text-slate-800 text-lg space-y-12">
                <div>
                    <h2 id="inject-h1"></h2>
                    <div id="inject-lead1" class="lead-in-text"></div>
                    <div id="inject-sub1" class="sub-heading"></div>
                    <p id="inject-c1"></p>
                </div>

                <div class="image-placeholder" id="image-box">
                    <p id="inject-img-file" class="text-slate-400 font-mono text-xs mb-2"></p>
                    <p id="inject-img-cap" class="italic text-sm text-slate-500"></p>
                </div>

                <div>
                    <h2 id="inject-h2"></h2>
                    <div id="inject-lead2" class="lead-in-text"></div>
                    <div id="inject-sub2" class="sub-heading"></div>
                    <p id="inject-c2"></p>
                </div>
            </div>

            <div class="mt-24 pt-12 border-t border-slate-200">
                <a href="blog.html" class="inline-block bg-slate-800 text-white px-10 py-3 rounded-full font-bold hover:bg-amber-600 transition mb-12">Back to Blog Feed ❯</a>
                <h4 class="section-title-blue text-2xl mb-8">Recommended for you</h4>
                <div id="recommended-list"></div>
            </div>
        </article>

        <button id="backToTop">▲</button>
        
        <div id="footer-placeholder"></div>
    </div>

    <script src="../../assets/js/footer-bundle.js"></script>
    <script src="../../assets/js/blog-registry.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Data Injection Logic
            document.getElementById('inject-breadcrumb').innerText = postData.shortTitle || postData.title;
            document.getElementById('inject-title').innerText = postData.title;
            document.getElementById('inject-date').innerText = postData.date;
            
            const fieldMap = {
                'h1': postData.heading1, 'lead1': postData.leadIn1, 'sub1': postData.subHeading1, 'c1': postData.content1,
                'h2': postData.heading2, 'lead2': postData.leadIn2, 'sub2': postData.subHeading2, 'c2': postData.content2
            };

            for (const [id, data] of Object.entries(fieldMap)) {
                const el = document.getElementById('inject-' + id);
                if (data) { el.innerText = data; } else { el.style.display = "none"; }
            }

            const imageBox = document.getElementById('image-box');
            if (postData.imageFilename) {
                document.getElementById('inject-img-file').innerText = "[ IMAGE: " + postData.imageFilename + " ]";
                document.getElementById('inject-img-cap').innerText = postData.imageCaption;
            } else { imageBox.style.display = "none"; }

            document.getElementById('inject-categories').innerHTML = postData.categories.map(c => 
                `<span style="background:rgba(15,23,42,0.08); color:var(--midnight); padding:3px 12px; border-radius:50px; font-size:10px; font-weight:800; text-transform:uppercase;">${c}</span>`
            ).join('');
            
            document.getElementById('inject-highlights').innerHTML = postData.highlights.map(h => `<li>${h}</li>`).join('');

            // Scroll & Progress Logic
            const btt = document.getElementById('backToTop');
            const pBar = document.getElementById("progress-bar");

            window.addEventListener('scroll', () => {
                const winScroll = window.pageYOffset || document.documentElement.scrollTop;
                const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
                const scrolled = (winScroll / height) * 100;
                
                pBar.style.width = scrolled + "%";
                
                if (winScroll > 400) { btt.classList.add('visible'); } 
                else { btt.classList.remove('visible'); }
            });

            btt.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });

            // Recommendations
            if (typeof blogPosts !== 'undefined') {
                const recs = blogPosts.filter(p => p.title !== postData.title).slice(0, 5);
                document.getElementById('recommended-list').innerHTML = recs.map(p => `
                    <a href="${p.link}" class="recommendation-link">${p.title} <span class="text-slate-300 text-xs ml-3">— ${p.date}</span></a>
                `).join('');
            }
        });
    </script>
</body>
</html>
