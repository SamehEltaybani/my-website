<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Dr. Sameh Eltaybani</title>
    <link rel="stylesheet" href="../../assets/css/custom-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Sticky Ribbon & Search Styling */
        .blog-controls {
            position: sticky;
            top: 70px; /* Sits under Sticky Nav */
            z-index: 1000;
            background: white;
            padding: 20px 40px;
            border-bottom: 1px solid #e2e8f0;
        }
        .category-pill {
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 700;
            background: #f1f5f9;
            color: var(--midnight);
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            border: 1px solid transparent;
        }
        .category-pill.active {
            background: var(--amber);
            color: white;
        }
        .search-bar {
            width: 100%;
            max-width: 300px;
            padding: 8px 15px;
            border-radius: 10px;
            border: 1px solid #cbd5e1;
            font-size: 14px;
        }
        .tag-pill-mini {
            display: inline-block;
            font-size: 10px;
            font-weight: 800;
            background: rgba(30, 58, 138, 0.1);
            color: var(--midnight);
            padding: 2px 10px;
            border-radius: 4px;
            margin-right: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="master-container">
        <nav class="navbar"></nav> <div class="breadcrumb-bar">
            <a href="../../index.html" style="text-decoration:none; color:inherit;">HOME</a> ❯ BLOG
        </div>

        <div class="blog-controls">
            <div class="flex flex-col md:flex-row justify-between items-center gap-4">
                <input type="text" id="blogSearch" class="search-bar" placeholder="Search topics...">
                
                <div class="flex items-center gap-2 overflow-x-auto pb-2" style="max-width: 100%;">
                    <button class="category-pill active" id="btn-all" onclick="filterByCategory('all')">Show all topics</button>
                    <div id="category-ribbon" class="flex gap-2">
                        </div>
                </div>
            </div>
        </div>

        <div id="blog-container" class="p-12 space-y-6">
            </div>

        <div class="text-center pb-12">
            <button id="loadMoreBtn" onclick="loadMore()" class="bg-slate-800 text-white px-8 py-3 rounded-full font-bold hover:bg-amber-700 transition">Load More Topics</button>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="../../assets/js/footer-bundle.js"></script>
    <script src="../../assets/js/blog-registry.js"></script>
    <script>
        let displayedCount = 5;
        let currentFilter = 'all';

        function initBlog() {
            renderCategories();
            renderPosts();
        }

        function renderCategories() {
            const ribbon = document.getElementById('category-ribbon');
            const cats = [...new Set(blogPosts.flatMap(p => p.categories))];
            ribbon.innerHTML = cats.map(cat => 
                `<button class="category-pill" onclick="filterByCategory('${cat}')">${cat}</button>`
            ).join('');
        }

        function renderPosts() {
            const container = document.getElementById('blog-container');
            const searchVal = document.getElementById('blogSearch').value.toLowerCase();
            
            const filtered = blogPosts
                .filter(p => (currentFilter === 'all' || p.categories.includes(currentFilter)))
                .filter(p => p.title.toLowerCase().includes(searchVal))
                .sort((a,b) => new Date(b.date) - new Date(a.date));

            const toShow = filtered.slice(0, displayedCount);
            
            container.innerHTML = toShow.map(p => `
                <a href="${p.link}" class="feature-card" style="display:block;">
                    <div class="flex justify-between items-start">
                        <h3 style="color: var(--midnight);" class="text-xl font-bold mb-2">${p.title}</h3>
                        <span class="text-slate-400 text-xs font-mono">${p.date}</span>
                    </div>
                    <div class="mb-4">
                        ${p.categories.map(c => `<span class="tag-pill-mini">${c}</span>`).join('')}
                    </div>
                    <p class="text-slate-500 text-sm mb-4">${p.excerpt}</p>
                    <span style="color: var(--amber);" class="text-xs font-bold uppercase">Read Article ❯</span>
                </a>
            `).join('');

            document.getElementById('loadMoreBtn').style.display = displayedCount >= filtered.length ? 'none' : 'inline-block';
        }

        function filterByCategory(cat) {
            currentFilter = cat;
            displayedCount = 5;
            document.querySelectorAll('.category-pill').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === cat || (cat === 'all' && btn.id === 'btn-all'));
            });
            renderPosts();
        }

        function loadMore() {
            displayedCount += 5;
            renderPosts();
        }

        document.getElementById('blogSearch').addEventListener('input', renderPosts);
        window.onload = initBlog;
    </script>
</body>
</html>
