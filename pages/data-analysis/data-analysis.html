<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="../../assetsnk href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheetcom

    <style>
        /* --- PHILOSOPHY & HIGHLIGHTS --- */
        .vision-header {
            background: linear-gradient(to top, #1e3a8a 0%, #1e293b 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 5px solid #D97706;
        }

        .vision-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        .vision-text {
            max-width: 800px;
            margin: 0 auto 40px;
            font-size: 1.2rem;
            line-height: 1.8;
        }

        .pillars-container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .pillars-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media (min-width: 768px) {
            .pillars-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .pillar-card {
            background: #F8FAFC;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-left: 5px solid #D97706;
            border-right: 5px solid #1e3a8a;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .pillar-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px rgba(0,0,0,0.1);
        }

        .pillar-content {
            padding: 25px;
            display: flex;
            flex-direction: column;
        }

        .pillar-title {
            font-size: 1.25rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .pillar-desc {
            flex-grow: 1;
            margin-bottom: 20px;
        }

        .read-more-btn {
            background: #1e3a8a;
            color: white;
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-transform: uppercase;
            text-decoration: none;
            transition: 0.3s;
            align-self: flex-start;
        }

        .read-more-btn:hover {
            background: #D97706;
            transform: translateX(5px);
        }
    </style>
</head>

<body>

<div class="master-container">

    <nav class="navbar"></nav>

        </p>
    </header>

    <main class="pillars-container">
        <div id="pillars-grid" class="pillars-grid"></div>
    </main>

    <div id="footer-placeholder"></div>
</div>

<!-- ✅ RESTORED CORRECTLY -->
<script src="../../assets/jse.js</script>

<script>
    const analysisPillars = [
        { title:"Longitudinal Aging Trends", desc:"Advanced visualization of cognitive decline.", blogId:"201" },
        { title:"Predictive Health Modeling", desc:"Machine learning for readmission risk.", blogId:"202" },
        { title:"Geospatial Service Analysis", desc:"Mapping healthcare access.", blogId:"203" },
        { title:"Survival Analysis Models", desc:"Kaplan‑Meier recovery studies.", blogId:"204" },
        { title:"Cluster Analysis", desc:"Patient archetype identification.", blogId:"205" },
        { title:"Bibliometric Networks", desc:"Evolution of nursing research.", blogId:"206" },
        { title:"Multivariate Regression", desc:"Socio‑environmental risk modeling.", blogId:"207" },
        { title:"Staffing Optimization", desc:"Balancing nurse‑patient ratios.", blogId:"208" },
        { title:"Sentiment Mining", desc:"NLP on clinical interviews.", blogId:"209" },
        { title:"Resource Distribution", desc:"Hospital efficiency modeling.", blogId:"210" }
    ];

    function renderPillars() {
        document.getElementById("pillars-grid").innerHTML =
            analysisPillars.map(p => `
                <div class="pillar-card">
                    <div class="pillar-content">
                        <h3 class="pillar-title">${p.title}</h3>
                        <p class="pillar-desc">${p.desc}</p>
                        <a href="pages/blog/blog-${phtml
                            Read more >>
                        </a>
                    </div>
                </div>
            `).join("");
    }

    window.onload = renderPillars;
</script>
