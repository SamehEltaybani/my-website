<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | Dr. Sameh Eltaybani</title>
    <link rel="stylesheet" href="../../assets/css/custom-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .pub-controls { position: sticky; top: 70px; z-index: 1000; background: white; padding: 20px 40px; border-bottom: 1px solid #e2e8f0; }
        .filter-select { padding: 8px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 14px; color: var(--midnight); min-width: 150px; background-color: #f8fafc; }
        
        /* Matching Blog Featured Card Style */
        .pub-card { border: 1px solid #e2e8f0; background: white; padding: 30px; border-radius: 12px; transition: transform 0.3s ease, shadow 0.3s ease; }
        .pub-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-color: var(--amber); }

        .authorship-pill { padding: 4px 12px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; display: inline-block; margin-bottom: 15px; }
        .btn-amber-pill { background: rgba(217, 119, 6, 0.1); color: #b45309; } /* Subtle Amber */
        .btn-slate-pill { background: rgba(71, 85, 105, 0.1); color: #475569; } /* Subtle Slate */

        /* Highlighting Action Buttons */
        .action-link { 
            font-size: 12px; 
            font-weight: 700; 
            text-decoration: none; 
            transition: 0.3s; 
            padding: 10px 18px; 
            border-radius: 8px; 
            display: inline-block; 
            margin-right: 10px; 
            margin-top: 10px;
            background: var(--midnight);
            color: white !important; /* High Visibility */
        }
        .action-link:hover { background: var(--amber); transform: scale(1.05); }
        .insight-link { background: var(--amber) !important; } /* Distinctive color for Insights */
    </style>
</head>
<body>

    <div class="master-container">
        <nav class="navbar"></nav>

        <div class="breadcrumb-bar">
            <a href="../../index.html" style="text-decoration:none; color:inherit;">HOME</a> ❯ PUBLICATIONS
        </div>

        <div class="pub-controls">
            <div class="max-w-7xl mx-auto flex flex-wrap gap-4 items-center justify-between">
                <input type="text" id="pubSearch" class="p-2 border rounded-md w-full md:w-64" placeholder="Search titles...">
                
                <div class="flex flex-wrap gap-3">
                    <select id="filterJournal" class="filter-select" onchange="applyFilters()"><option value="all">All Journals</option></select>
                    <select id="filterAuthorship" class="filter-select" onchange="applyFilters()">
                        <option value="all">All Authorship</option>
                        <option value="First/Corresponding">First/Corresponding</option>
                        <option value="Co-author">Co-author</option>
                    </select>
                    
                    <select id="sortOrder" class="filter-select" onchange="applyFilters()" style="border-color: var(--amber); font-weight: bold;">
                        <option value="yearDesc">Year (Newest)</option>
                        <option value="yearAsc">Year (Oldest)</option>
                        <option value="journalAlpha">Journal (A-Z)</option>
                        <option value="authorAlpha">Authorship (A-Z)</option>
                    </select>

                    <button onclick="resetFilters()" class="text-xs font-bold text-slate-400 hover:text-amber-600">RESET</button>
                </div>
            </div>
        </div>

        <div id="pub-container" class="p-10 max-w-7xl mx-auto grid grid-cols-1 gap-8">
            </div>

        <div class="text-center pb-20">
            <button id="loadMoreBtn" onclick="loadMore()" class="bg-slate-800 text-white px-10 py-3 rounded-full font-bold hover:bg-amber-700 transition">Load More Publications</button>
        </div>

        <div id="footer-placeholder"></div>
    </div>

    <script src="../../assets/js/footer-bundle.js"></script>
    <script src="../../assets/js/publication-registry.js"></script>
    <script>
        let visibleCount = 10;
        
        function initPubs() {
            const journals = [...new Set(publications.map(p => p.journal))].sort();
            const jSelect = document.getElementById('filterJournal');
            journals.forEach(j => jSelect.innerHTML += `<option value="${j}">${j}</option>`);
            renderPubs();
        }

        function renderPubs() {
            const container = document.getElementById('pub-container');
            const search = document.getElementById('pubSearch').value.toLowerCase();
            const jFilter = document.getElementById('filterJournal').value;
            const aFilter = document.getElementById('filterAuthorship').value;
            const sortVal = document.getElementById('sortOrder').value;

            let filtered = publications.filter(p => {
                const matchSearch = p.title.toLowerCase().includes(search);
                const matchJ = jFilter === 'all' || p.journal === jFilter;
                const matchA = aFilter === 'all' || p.authorship === aFilter;
                return matchSearch && matchJ && matchA;
            });

            // Sorting Logic
            filtered.sort((a, b) => {
                if (sortVal === "yearDesc") return b.year - a.year;
                if (sortVal === "yearAsc") return a.year - b.year;
                if (sortVal === "journalAlpha") return a.journal.localeCompare(b.journal);
                if (sortVal === "authorAlpha") return a.authorship.localeCompare(b.authorship);
                return 0;
            });

            const displayList = filtered.slice(0, visibleCount);
            
            container.innerHTML = displayList.map(p => `
                <div class="pub-card">
                    <div class="flex justify-between items-start">
                        <span class="authorship-pill ${p.authorship.includes('First') ? 'btn-amber-pill' : 'btn-slate-pill'}">${p.authorship}</span>
                        <span class="font-bold text-sm text-slate-400">${p.year}</span>
                    </div>
                    <h3 class="text-2xl font-extrabold mb-2 text-slate-800 leading-tight">${p.title}</h3>
                    <p class="text-slate-500 mb-6 font-semibold">${p.journal}</p>
                    
                    <div class="flex flex-wrap gap-2">
                        <a href="${p.journalLink}" target="_blank" class="action-link">Journal Website ❯</a>
                        ${p.pubmedLink ? `<a href="${p.pubmedLink}" target="_blank" class="action-link">PubMed ❯</a>` : ''}
                        ${p.blogLink ? `<a href="../blog/${p.blogLink}.html" class="action-link insight-link">Read My Insights ❯</a>` : ''}
                    </div>
                </div>
            `).join('');

            document.getElementById('loadMoreBtn').style.display = visibleCount >= filtered.length ? 'none' : 'inline-block';
        }

        function applyFilters() { visibleCount = 10; renderPubs(); }
        function loadMore() { visibleCount += 10; renderPubs(); }
        function resetFilters() {
            document.getElementById('pubSearch').value = '';
            document.getElementById('filterJournal').value = 'all';
            document.getElementById('filterAuthorship').value = 'all';
            document.getElementById('sortOrder').value = 'yearDesc';
            applyFilters();
        }

        document.getElementById('pubSearch').addEventListener('input', applyFilters);
        window.onload = initPubs;
    </script>
</body>
</html>
